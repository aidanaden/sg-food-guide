name = "sg-food-guide"
compatibility_date = "2024-01-01"

[build]
command = "bun run build"

[site]
bucket = "./dist/client"

[[d1_databases]]
binding = "STALLS_DB"
database_name = "sg-food-guide-stalls"
database_id = "REPLACE_WITH_ACTUAL_DATABASE_ID"

[vars]
ENVIRONMENT = "production"

[triggers]
crons = ["0 6 * * *"]  # Daily at 6am UTC - runs stall sync

# Secrets (set via wrangler secret put):
# - SYNC_ADMIN_TOKEN
# - FOOD_GUIDE_SHEET_ID
# - YOUTUBE_DATA_API_KEY
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_CHAT_ID
# - (optional) GOOGLE_PLACES_API_KEY
